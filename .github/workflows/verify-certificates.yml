name: Verify certificates

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ramsey-certificates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exact-certificates:
    name: Exact certificates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Show toolchain
        run: |
          python3 --version
          c++ --version

      - name: Verify frozen certificates
        run: sh tests/run_certificate_checks.sh
