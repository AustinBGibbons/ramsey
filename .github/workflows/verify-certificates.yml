name: Verify certificates

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ramsey-certificates-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exact-certificates:
    name: Exact certificates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"

      - name: Show toolchain
        run: |
          python3 --version
          cc --version
          c++ --version

      - name: Verify positive and negative certificates
        run: sh tests/run_certificate_checks.sh
